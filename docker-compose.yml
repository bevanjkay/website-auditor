services:
  web:
    image: ghcr.io/bevankay/website-auditor-web:latest
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    command: >
      sh -c "pnpm --filter @website-auditor/db db:push &&
      pnpm --filter @website-auditor/web start"

  worker:
    image: ghcr.io/bevankay/website-auditor-worker:latest
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    command: >
      sh -c "pnpm --filter @website-auditor/db db:push &&
      pnpm --filter @website-auditor/worker start"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-website_auditor}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
